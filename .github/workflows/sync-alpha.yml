name: Sync Alpha

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-alpha
  cancel-in-progress: false

jobs:
  sync-alpha:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify alpha branch exists
        run: git ls-remote --exit-code --heads origin alpha

      - name: Merge main into alpha
        run: |
          git fetch origin alpha main
          git checkout -B alpha origin/alpha
          git merge --no-ff --no-edit origin/main
          git push origin alpha

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Publish alpha prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main alpha --tags --force
          git checkout -B alpha origin/alpha
          git branch --track main origin/main || true
          pnpm release --debug
