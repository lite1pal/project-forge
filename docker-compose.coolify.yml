services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${API_PUBLIC_URL}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      api:
        condition: service_started
    command: ["pnpm", "start:web:container"]
    environment:
      WEB_API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${API_PUBLIC_URL}
    ports:
      - "3000:3000"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      PORT: 4000
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW: 1 minute
      DATABASE_URL: postgres://auditrail:auditrail@postgres:5432/auditrail
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_SESSION_COOKIE_SECURE: "true"
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
    ports:
      - "4000:4000"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auditrail
      POSTGRES_USER: auditrail
      POSTGRES_PASSWORD: auditrail
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditrail -d auditrail"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
